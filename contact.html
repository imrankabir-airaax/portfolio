<!doctype html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Imran Kabir</title>
    <link rel="stylesheet" href="contactstyle.css">
</head>

<body>

<div id="header">
    <header>
        <div class="logo">       
            <img id="lgimg" src="header-logo-icon.png">
        </div>
        <div class="logo">
            <a id="gap" class="nav" href="project.html">Home</a>
           
            <a class="nav" href="pricing.html">Pricing</a>
           
        </div>
    </header>    
</div>

<main>

<div id="contactpage">

    <div id="contacttext">
        <h1 id="contacttitle">Let's Work Together</h1>
        <p id="contactsubtitle">
            Have a project in mind?  
            Send me a message and let's build something amazing.
        </p>
    </div>

    <div id="formsection">
        <form action="https://formspree.io/f/mdaljqbe" method="POST" id="contactform">

            <input type="text" name="name" placeholder="Your Name" required>

            <input type="email" name="email" placeholder="Your Email" required>

            <input type="text" name="subject" placeholder="Subject">

            <textarea name="message" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

        </form>
    </div>

</div>

</main>

</body>
</html>
